<!DOCTYPE html>
<html>
<head>
  <title>Bulk STK Push</title>
</head>
<body>
<h2>Bulk STK Push</h2>

<label>Phone Numbers (comma separated)</label><br>
<textarea id="numbers"></textarea><br>

<label>Amount</label><br>
<input type="number" id="amount" /><br>

<label>Reference</label><br>
<input type="text" id="reference" /><br><br>

<button onclick="sendSTK()">Send</button>

<pre id="output"></pre>

<script>
async function sendSTK() {
  const numbers = document.getElementById('numbers').value.split(',').map(n => n.trim());
  const amount = document.getElementById('amount').value;
  const reference = document.getElementById('reference').value;

  const res = await fetch('/stkpush', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ numbers, amount, reference })
  });

  const data = await res.json();
  document.getElementById('output').innerText = JSON.stringify(data, null, 2);
}
</script>
</body>
</html>
